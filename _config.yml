# =============================================
# SITE SETTINGS
# =============================================
title: "Omprakash Jena"
title_separator: "|"
subtitle: "Developer & Open Source Enthusiast"
name: "Omprakash Jena"
description: "Personal site, portfolio, and blog."
url: "https://omprakashjena.github.io"
baseurl: ""
repository: "omprakashjena/omprakashjena.github.io"

# =============================================
# THEME
# =============================================
remote_theme: "mmistakes/minimal-mistakes@4.28.0"

# Skins: "default" | "air" | "aqua" | "contrast" | "dark" | "dirt" | "neon" | "mint" | "plum" | "sunrise"
minimal_mistakes_skin: "dark"

# =============================================
# BUILD SETTINGS
# =============================================
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: "Asia/Kolkata"

# =============================================
# PLUGINS
# =============================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# =============================================
# AUTHOR INFO (appears in sidebar)
# =============================================
author:
  name: "Omprakash Jena"
  avatar: "/assets/images/bio-photo.jpg"   # Put your photo here
  bio: "Developer. Linux enthusiast. Open source tinkerer."
  location: "India"
  email: "your@email.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/omprakashjena"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/omprakashjena"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/yourhandle"

# =============================================
# FOOTER LINKS
# =============================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/omprakashjena"

# =============================================
# DEFAULTS (applies settings to all pages/posts)
# =============================================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# =============================================
# SEARCH
# =============================================
search: true
search_full_content: true

